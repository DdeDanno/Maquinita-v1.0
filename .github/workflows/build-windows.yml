name: Build Electron App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    strategy:
      matrix:
        platform: [win32, darwin] # win32 = Windows, darwin = Mac

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Package Electron App
        run: |
          if [ "${{ matrix.platform }}" == "win32" ]; then
            npx electron-packager . "ControlMaquina" --platform=win32 --arch=x64 --out=dist --overwrite --electron-version=25.3.1
          else
            npx electron-packager . "ControlMaquina" --platform=darwin --arch=arm64 --out=dist --overwrite --electron-version=25.3.1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ControlMaquina-${{ matrix.platform }}
          path: dist/*