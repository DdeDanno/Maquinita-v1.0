name: Build Windows EXE

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Package Electron app
        run: npx electron-packager . ControlMaquina --platform=win32 --arch=x64 --out=dist --overwrite

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: ControlMaquina-Windows
          path: dist/