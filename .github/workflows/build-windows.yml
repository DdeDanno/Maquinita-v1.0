name: Build Electron App for Windows

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install electron-packager
        run: npm install electron-packager --save-dev

      - name: Package Electron app
        run: npx electron-packager . "ControlMaquina" --platform=win32 --arch=x64 --out=dist --overwrite

      - name: Upload packaged app
        uses: actions/upload-artifact@v4
        with:
          name: ControlMaquina-Win64
          path: dist/ControlMaquina-win32-x64/