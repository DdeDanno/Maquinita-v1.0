name: Build Electron App

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v3
        with:
          node-version: 20
      - run: npm install
      - run: npx electron-packager . "ControlMaquina" --platform=win32 --arch=x64 --out=dist --overwrite --electron-version=25.3.1
      - uses: actions/upload-artifact@v4
        with:
          name: ControlMaquina-win32-x64
          path: dist/ControlMaquina-win32-x64